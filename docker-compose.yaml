version: "3.9"

services:

# ── PostgreSQL ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: aigis-postgres
    restart: always
    environment:
      POSTGRES_USER:     aigis
      POSTGRES_PASSWORD: aigis
      POSTGRES_DB:       aigis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U aigis"]
      interval: 5s
      timeout:  5s
      retries:  5

# ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: aigis-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  5s
      retries:  5

# ── Ollama ─────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      # This saves the models directly to a folder in your project directory
      - ./ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q 'llama3'"]
      interval: 10s
      timeout:  5s
      retries:  30
      start_period: 60s

  ollama-pull:
    image: ollama/ollama
    container_name: ollama-pull
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: pull llama3
    restart: on-failure
    depends_on:
      - ollama
      
# ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context:    .
      dockerfile: Dockerfile
    container_name: aigis-backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy   # wait for model to be ready
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./uploads:/app/uploads
      - reports_data:/app/reports
    environment:
      DATABASE_URL: postgresql://aigis:aigis@postgres:5432/aigis
      REDIS_URL:    redis://redis:6379/0
      OLLAMA_HOST:  http://ollama:11434
      OLLAMA_MODEL: llama3

# ── Worker ───────────────────────────────────────────────────────────────────
  worker:
    build:
      context:    .
      dockerfile: docker/worker.Dockerfile
    container_name: aigis-worker
    command: celery -A backend.workers.celery_app:celery worker --loglevel=info
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy   # wait for model to be ready
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./uploads:/app/uploads
      - reports_data:/app/reports
    environment:
      DATABASE_URL: postgresql://aigis:aigis@postgres:5432/aigis
      REDIS_URL:    redis://redis:6379/0
      OLLAMA_HOST:  http://ollama:11434
      OLLAMA_MODEL: llama3

# ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context:    .
      dockerfile: frontend.Dockerfile
    container_name: aigis-frontend
    restart: always
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
    volumes:                                 
      - ./frontend:/app/frontend

volumes:
  postgres_data:
  reports_data: