version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: aigis-postgres
    restart: always
    environment:
      POSTGRES_USER: aigis
      POSTGRES_PASSWORD: aigis
      POSTGRES_DB: aigis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: aigis-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli","ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: aigis-backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://aigis:aigis@postgres:5432/aigis
      REDIS_URL: redis://redis:6379/0

  worker:
    build: .
    container_name: aigis-worker
    command: celery -A backend.workers.celery_app:celery worker --loglevel=info
    restart: always
    depends_on:
      - backend
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://aigis:aigis@postgres:5432/aigis
      REDIS_URL: redis://redis:6379/0

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      /bin/sh -c "
      ollama serve &
      sleep 5 &&
      ollama pull llama3 &&
      wait
      "

volumes:
  postgres_data:
  ollama_data: